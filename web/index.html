<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台指期當沖訓練 — 1分K 回放</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; height: 100vh; display: flex; flex-direction: column;
           font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
           background: #131722; color: #d1d4dc; }
    .bar { display: flex; align-items: center; gap: 12px; padding: 8px 16px;
           background: #1e222d; border-bottom: 1px solid #2a2e39; flex-wrap: wrap; }
    button, select { background: #2a2e39; color: #d1d4dc; border: 1px solid #3a3f4b;
            border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 14px; }
    button:hover { background: #363c4a; }
    button:disabled { opacity: .4; cursor: default; }
    label { font-size: 13px; color: #868993; }
    #status { margin-left: auto; font-size: 13px; color: #868993; }
    #chart { flex: 1; width: 100%; }
    .speed-val { min-width: 64px; display: inline-block; text-align: center; font-weight: 600; }
    .speed-btn { min-width: 38px; font-weight: bold; font-size: 16px; }

    /* 下單列 */
    #buyBtn  { background: #5a1f23; border-color: #ef5350; }
    #buyBtn:hover  { background: #7a282d; }
    #sellBtn { background: #14463f; border-color: #26a69a; }
    #sellBtn:hover { background: #1c5e54; }
    #flatBtn { background: #3a3f4b; }
    .pnl-item { font-size: 13px; color: #868993; }
    .pnl-item b { color: #d1d4dc; font-size: 15px; margin-left: 4px; font-variant-numeric: tabular-nums; }
    .up   { color: #ef5350 !important; }   /* 獲利＝紅（台股慣例） */
    .down { color: #26a69a !important; }   /* 虧損＝綠 */
  </style>
</head>
<body>
  <div class="bar" id="toolbar">
    <label>交易日</label>
    <select id="dateSel"></select>
    <button id="playBtn">▶ 播放</button>
    <button id="stepBtn">⏭ 單步</button>
    <label>速度</label>
    <button id="speedDown" class="speed-btn" title="放慢">－</button>
    <span class="speed-val" id="speedVal">1x 真實</span>
    <button id="speedUp" class="speed-btn" title="加快">＋</button>
    <button id="realBtn" title="1x：依當天真實節奏播放">🕒 真實速度</button>
    <span id="status">尚未連線</span>
  </div>

  <div class="bar" id="tradebar">
    <button id="buyBtn"  title="做多 1 口（鍵盤 B）">買進 ▲</button>
    <button id="sellBtn" title="做空 1 口（鍵盤 S）">賣出 ▼</button>
    <button id="flatBtn" title="平掉全部部位（鍵盤 F）">平倉</button>
    <span class="pnl-item">現價<b id="pxVal">—</b></span>
    <span class="pnl-item">部位<b id="posVal">無</b></span>
    <span class="pnl-item">未實現<b id="uplVal">0</b></span>
    <span class="pnl-item">已實現<b id="rplVal">0</b></span>
    <span class="pnl-item">總損益<b id="totVal">0</b></span>
    <span id="ptNote" class="pnl-item" style="margin-left:auto;"></span>
  </div>

  <div id="chart"></div>
  <script src="main.js"></script>
</body>
</html>

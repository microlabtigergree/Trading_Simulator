<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台指期當沖訓練 — 1分K 回放</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; height: 100vh; display: flex; flex-direction: column;
           font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
           background: #131722; color: #d1d4dc; }
    .bar { display: flex; align-items: center; gap: 12px; padding: 8px 16px;
           background: #1e222d; border-bottom: 1px solid #2a2e39; flex-wrap: wrap; }
    button, select { background: #2a2e39; color: #d1d4dc; border: 1px solid #3a3f4b;
            border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 14px; }
    input[type=number], input[type=time] { background: #2a2e39; color: #d1d4dc;
            border: 1px solid #3a3f4b; border-radius: 4px; padding: 5px 8px; font-size: 14px; }
    button:hover { background: #363c4a; }
    button:disabled { opacity: .4; cursor: default; }
    label { font-size: 13px; color: #868993; }
    #status { margin-left: auto; font-size: 13px; color: #868993; }

    #main { flex: 1; display: flex; min-height: 0; }
    #chart { flex: 1; min-width: 0; }

    .speed-val { min-width: 64px; display: inline-block; text-align: center; font-weight: 600; }
    .speed-btn { min-width: 38px; font-weight: bold; font-size: 16px; }

    /* 下單列 */
    #buyBtn  { background: #5a1f23; border-color: #ef5350; }
    #buyBtn:hover  { background: #7a282d; }
    #sellBtn { background: #14463f; border-color: #26a69a; }
    #sellBtn:hover { background: #1c5e54; }
    .pnl-item { font-size: 13px; color: #868993; }
    .pnl-item b { color: #d1d4dc; font-size: 15px; margin-left: 4px; font-variant-numeric: tabular-nums; }
    .up   { color: #ef5350 !important; }   /* 獲利＝紅（台股慣例） */
    .down { color: #26a69a !important; }   /* 虧損＝綠 */

    /* 交易明細側欄 */
    #tradeLog { width: 340px; overflow-y: auto; background: #1b1f2a;
                border-left: 1px solid #2a2e39; display: none; }
    #tradeLog.show { display: block; }
    #tradeLog table { width: 100%; border-collapse: collapse; font-size: 12px;
                font-variant-numeric: tabular-nums; }
    #tradeLog th, #tradeLog td { padding: 4px 8px; text-align: right;
                border-bottom: 1px solid #2a2e3988; }
    #tradeLog th { color: #868993; font-weight: normal; position: sticky; top: 0;
                background: #1b1f2a; }
    #tradeLog td.act-b { color: #ef5350; }
    #tradeLog td.act-s { color: #26a69a; }
    #logEmpty { padding: 16px; color: #868993; font-size: 13px; text-align: center; }

    /* 歷史成績 modal */
    .modal { position: fixed; inset: 0; background: #000000aa; z-index: 10;
             display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #1b1f2a; border: 1px solid #2a2e39; border-radius: 8px;
                 width: min(880px, 92vw); max-height: 84vh; overflow: auto; padding: 16px 20px; }
    .modal-head { display: flex; align-items: center; justify-content: space-between;
                  margin-bottom: 12px; font-size: 16px; }
    #histSummary { font-size: 14px; margin-bottom: 12px; line-height: 1.8; }
    #histSummary b { font-variant-numeric: tabular-nums; }
    #histTable { width: 100%; border-collapse: collapse; font-size: 13px;
                 font-variant-numeric: tabular-nums; }
    #histTable th, #histTable td { padding: 6px 10px; text-align: right;
                 border-bottom: 1px solid #2a2e3988; }
    #histTable th { color: #868993; font-weight: normal; }
  </style>
</head>
<body>
  <div class="bar" id="toolbar">
    <label>商品</label>
    <select id="productSel"></select>
    <label>日期</label>
    <select id="dateSel"></select>
    <span id="blindLabel" style="display:none;">🙈 ？？？</span>
    <button id="playBtn">▶ 播放</button>
    <button id="stepBtn">⏭ 單步</button>
    <label>速度</label>
    <button id="speedDown" class="speed-btn" title="放慢">－</button>
    <span class="speed-val" id="speedVal">1x 真實</span>
    <button id="speedUp" class="speed-btn" title="加快">＋</button>
    <button id="realBtn" title="1x：依當天真實節奏播放">🕒 真實速度</button>
    <span style="width:1px; height:24px; background:#3a3f4b;"></span>
    <button id="randomBtn" title="隨機抽一天練習">🎲 隨機</button>
    <label><input type="checkbox" id="blindChk" /> 盲測</label>
    <label>起始</label>
    <input id="startTime" type="time" value="08:45" step="60" />
    <button id="startAtBtn" title="清空並從指定時間開始播放">⏱ 從此開始</button>
    <span id="status">尚未連線</span>
  </div>

  <div class="bar" id="tradebar">
    <label>口數</label>
    <input id="qtyInput" type="number" min="1" value="1" style="width:52px;" />
    <button id="buyBtn"  title="做多（鍵盤 B）">買進 ▲</button>
    <button id="sellBtn" title="做空（鍵盤 S）">賣出 ▼</button>
    <button id="flatBtn" title="平掉全部部位（鍵盤 F）">平倉</button>
    <label title="距進場點數，觸價自動平倉">停損</label>
    <input id="slInput" type="number" min="0" placeholder="點" style="width:60px;" />
    <label title="距進場點數，觸價自動平倉">停利</label>
    <input id="tpInput" type="number" min="0" placeholder="點" style="width:60px;" />
    <label title="每口每邊手續費(元)">手續費</label>
    <input id="feeInput" type="number" min="0" style="width:56px;" />
    <span class="pnl-item">現價<b id="pxVal">—</b></span>
    <span class="pnl-item">部位<b id="posVal">無</b></span>
    <span class="pnl-item">未實現<b id="uplVal">0</b></span>
    <span class="pnl-item">已實現<b id="rplVal">0</b></span>
    <span class="pnl-item">費稅<b id="costVal">0</b></span>
    <span class="pnl-item">總損益<b id="totVal">0</b></span>
    <span id="ptNote" class="pnl-item" style="margin-left:auto;"></span>
  </div>

  <div class="bar" id="statsbar">
    <span class="pnl-item">交易次數<b id="nTrades">0</b></span>
    <span class="pnl-item">勝率<b id="winRate">—</b></span>
    <span class="pnl-item">獲利次數<b id="nWin">0</b></span>
    <span class="pnl-item">虧損次數<b id="nLoss">0</b></span>
    <span class="pnl-item">平均獲利<b id="avgWin">0</b></span>
    <span class="pnl-item">平均虧損<b id="avgLoss">0</b></span>
    <span class="pnl-item">獲利因子<b id="profitFactor">—</b></span>
    <span class="pnl-item">最大回撤<b id="maxDD">0</b></span>
    <span class="pnl-item">最大連虧<b id="maxConsec">0</b></span>
    <button id="saveBtn" style="margin-left:auto;">💾 存檔成績</button>
    <button id="historyBtn">📊 歷史成績</button>
    <button id="logToggle">交易明細 ▼</button>
  </div>

  <div id="main">
    <div id="chart"></div>
    <div id="tradeLog">
      <div id="logEmpty">尚無成交紀錄</div>
      <table id="logTable" style="display:none;">
        <thead>
          <tr><th>#</th><th>時間</th><th>動作</th><th>價格</th><th>口數</th><th>損益</th></tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>

  <div id="historyModal" class="modal" style="display:none;">
    <div class="modal-box">
      <div class="modal-head">
        <b>📊 歷史練習成績</b>
        <span style="display:flex; gap:8px;">
          <button id="histClear">🗑 清除歷史</button>
          <button id="histClose">✕</button>
        </span>
      </div>
      <div id="histSummary"></div>
      <table id="histTable">
        <thead>
          <tr><th>存檔時間</th><th>交易日</th><th>商品</th><th>筆數</th><th>勝率</th>
              <th>總損益</th><th>最大回撤</th><th>最大連虧</th></tr>
        </thead>
        <tbody id="histBody"></tbody>
      </table>
      <div id="histEmpty" style="display:none; padding:24px; text-align:center; color:#868993;">
        尚無存檔紀錄
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
